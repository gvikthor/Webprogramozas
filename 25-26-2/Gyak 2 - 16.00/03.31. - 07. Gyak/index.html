<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #new-game-error {
        color: red;
    }

    #menu {
        display: flex;
    }
    #menu span {
        display: block;
        margin: auto;
        cursor: pointer;
    }

    .current {
        text-decoration: underline;
    }

    .hidden {
        display: none;
    }

    .selected {
        text-decoration: underline;
        background-color: chartreuse;
    }
</style>
<body>
    <div id="menu"></div>

    <div id="page-games" class="page" data-title="Video games">
        <h1>Video games</h1>

        <h2>Add new game</h2>
        <input id="new-game-name" placeholder="Name of new game">
        <input id="new-game-year" placeholder="Release year">
        <input id="new-game-category" placeholder="Category">
        <button id="new-game-button">Add</button>

        <div id="new-game-error"></div>

        <h2>Game list</h2>
        <input id="filter-name">
        and
        <select id="filter-category"></select>
        <button id="filter-button">Filter</button>
        <ul id="game-list"></ul>
    </div>

    <div id="page-categories" class="page" data-title="Categories">
        <h1>Categories</h1>

        <h2>Add new category</h2>
        <input id="new-category-name" placeholder="Category name">
        <input id="new-category-color" type="color" value="#ffffff">
        <button id="new-category-button">Add</button>

        <div id="new-category-error"></div>
    </div>

    <div id="page-example" class="page" data-title="Example">
        <h1>Example</h1>
        <div>
            This is an example page.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
